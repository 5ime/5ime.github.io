</button> </div> <div id="error-message" class="hidden text-red-500 text-sm mt-2"></div> </div> <script data-astro-rerun>
  async function decrypt(data, key) {
    // 使用 PBKDF2 生成密钥
    const encoder = new TextEncoder();
    const keyData = encoder.encode(key);
    const salt = new Uint8Array(16); // 使用固定的盐值
    const cryptoKey = await crypto.subtle.importKey(
      "raw",
      keyData,
      { name: "PBKDF2" },
      false,
      ["deriveBits", "deriveKey"]
    );
    
    const derivedKey = await crypto.subtle.deriveKey(
      {
        name: "PBKDF2",
        salt,
        iterations: 100000,
        hash: "SHA-256"
      },
      cryptoKey,
      { name: "AES-CBC", length: 256 },
      false,
      ["decrypt"]
    );

    const decoder = new TextDecoder();
    const dataBuffer = new Uint8Array(
      atob(data)
        .split("")
        .map(c => c.charCodeAt(0))
    );

    const iv = dataBuffer.slice(0, 16);
    const encryptedData = dataBuffer.slice(16);

    const decryptedData = await crypto.subtle.decrypt(
      { name: "AES-CBC", iv },
      derivedKey,
      encryptedData
    );

    return decoder.decode(decryptedData);
  }

  function showError(message) {
    const errorElement = document.getElementById("error-message");
    errorElement.textContent = message;
    errorElement.classList.remove("hidden");
    setTimeout(() => {
      errorElement.classList.add("hidden");
    }, 3000);
  }

  function setLoading(isLoading) {
    const loadingIndicator = document.getElementById("loading-indicator");
    const submitButton = document.getElementById("password-btn");
    const input = document.getElementById("password");
    
    if (isLoading) {
      loadingIndicator.classList.remove("hidden");
      submitButton.disabled = true;
      input.disabled = true;
    } else {
      loadingIndicator.classList.add("hidden");
      submitButton.disabled = false;
      input.disabled = false;
    }
  }

  function prepare() {
    const encrypted = document
      .querySelector("meta[name=encrypted]")
      ?.getAttribute("content");
    const input = document.getElementById("password");
    const btn = document.getElementById("password-btn");
    const article = document.querySelector("#article");

    if (!encrypted || !input || !btn || !article) return;

    const handleSubmit = async () => {
      const password = input.value.trim();
      if (!password) {
        showError("请输入密码");
        return;
      }

      setLoading(true);
      try {
        const html = await decrypt(encrypted, password);
        article.innerHTML = html;
        input.value = "";
      } catch (e) {
        showError("密码错误，请重试");
      } finally {
        setLoading(false);
      }
    };

    btn.addEventListener("click", handleSubmit);
    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        handleSubmit();
      }
    });
  }

  prepare();
  document.addEventListener("astro:after-swap", prepare);
