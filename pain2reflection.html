  const CRYPTO_CONFIG = {
    saltLength: 16,
    ivLength: 16,
    iterations: 100000,
    keyLength: 256,
    algorithm: 'AES-CBC',
    hashAlgorithm: 'SHA-256',
    keyDerivation: 'PBKDF2'
  };

  async function deriveKey(password, salt) {
    const encoder = new TextEncoder();
    const keyData = encoder.encode(password);
    
    const baseKey = await crypto.subtle.importKey(
      'raw',
      keyData,
      { name: CRYPTO_CONFIG.keyDerivation },
      false,
      ['deriveBits', 'deriveKey']
    );
    
    return await crypto.subtle.deriveKey(
      {
        name: CRYPTO_CONFIG.keyDerivation,
        salt,
        iterations: CRYPTO_CONFIG.iterations,
        hash: CRYPTO_CONFIG.hashAlgorithm
      },
      baseKey,
      { name: CRYPTO_CONFIG.algorithm, length: CRYPTO_CONFIG.keyLength },
      false,
      ['decrypt']
    );
  }

  async function decrypt(encryptedData, password) {
    if (!encryptedData || !password) {
      throw new Error('加密数据和密码不能为空');
    }

    try {
      const decoder = new TextDecoder();
      
      const combinedData = new Uint8Array(
        atob(encryptedData)
          .split('')
          .map(c => c.charCodeAt(0))
      );
      
      const salt = combinedData.slice(0, CRYPTO_CONFIG.saltLength);
      const iv = combinedData.slice(
        CRYPTO_CONFIG.saltLength, 
        CRYPTO_CONFIG.saltLength + CRYPTO_CONFIG.ivLength
      );
      const encrypted = combinedData.slice(CRYPTO_CONFIG.saltLength + CRYPTO_CONFIG.ivLength);
      
      const key = await deriveKey(password, salt);
      
      const decryptedData = await crypto.subtle.decrypt(
        { name: CRYPTO_CONFIG.algorithm, iv },
        key,
        encrypted
      );
      
      return decoder.decode(decryptedData);
    } catch (error) {
      throw new Error('密码错误或数据损坏');
    }
  }

  function showError(message) {
    const errorElement = document.getElementById("error-message");
    if (errorElement) {
      errorElement.innerHTML = `
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-red-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <span>${message}</span>
        </div>
      `;
      errorElement.classList.remove("hidden");
      setTimeout(() => {
        errorElement.classList.add("hidden");
      }, 4000);
    }
  }

  function setLoading(isLoading) {
    const loadingIndicator = document.getElementById("loading-indicator");
    const submitButton = document.getElementById("password-btn");
    const input = document.getElementById("password");
    
    if (loadingIndicator && submitButton && input) {
      if (isLoading) {
        loadingIndicator.classList.remove("hidden");
        submitButton.disabled = true;
        input.disabled = true;
      } else {
        loadingIndicator.classList.add("hidden");
        submitButton.disabled = false;
        input.disabled = false;
      }
    }
  }

  function initializeDecryption() {
    const encrypted = document
      .querySelector("meta[name=encrypted]")
      ?.getAttribute("content");
    const input = document.getElementById("password");
    const btn = document.getElementById("password-btn");
    const article = document.querySelector("#article");

    if (!encrypted || !input || !btn || !article) {
      console.warn('解密组件初始化失败：缺少必要元素');
      return;
    }

    const handleSubmit = async () => {
      const password = input.value.trim();
      if (!password) {
        showError("请输入密码");
        input.focus();
        return;
      }

      setLoading(true);
      try {
        const html = await decrypt(encrypted, password);
        article.innerHTML = html;
        input.value = "";
        
        const container = input.closest('.flex');
        if (container) {
          container.style.opacity = '0';
          container.style.transform = 'translateY(-20px)';
          container.style.transition = 'all 0.5s ease-out';
          setTimeout(() => {
            container.style.display = 'none';
          }, 500);
        }
      } catch (error) {
        showError(error.message || "解密失败，请重试");
        input.focus();
        input.select();
      } finally {
        setLoading(false);
      }
    };

    btn.addEventListener("click", handleSubmit);
    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        handleSubmit();
      }
    });

    input.addEventListener("input", () => {
      const errorElement = document.getElementById("error-message");
      if (errorElement && !errorElement.classList.contains("hidden")) {
        errorElement.classList.add("hidden");
      }
    });
  }

  initializeDecryption();
  
  document.addEventListener("astro:after-swap", initializeDecryption);
</script>  </section> <footer class="mt-12 pt-8 border-t border-gray-200" role="contentinfo" aria-label="版权信息"> <div class="bg-gray-50 p-6 rounded-lg text-sm text-gray-700 leading-relaxed relative overflow-hidden">  <svg class="absolute -top-11 -right-8 w-40 h-40 opacity-10 pointer-events-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 496 512" aria-hidden="true"> <path fill="#4a4a4a" d="M245.8 214.9l-33.2 17.3c-9.4-19.6-25.2-20-27.4-20-22.2 0-33.3 14.6-33.3 43.9 0 23.5 9.2 43.8 33.3 43.8 14.4 0 24.6-7 30.5-21.3l30.6 15.5a73.2 73.2 0 01-65.1 39c-22.6 0-74-10.3-74-77 0-58.7 43-77 72.6-77 30.8-.1 52.7 11.9 66 35.8zm143 0l-32.7 17.3c-9.5-19.8-25.7-20-27.9-20-22.1 0-33.2 14.6-33.2 43.9 0 23.5 9.2 43.8 33.2 43.8 14.5 0 24.7-7 30.5-21.3l31 15.5c-2 3.8-21.3 39-65 39-22.7 0-74-9.9-74-77 0-58.7 43-77 72.6-77C354 179 376 191 389 214.8zM247.7 8C104.7 8 0 123 0 256c0 138.4 113.6 248 247.6 248C377.5 504 496 403 496 256 496 118 389.4 8 247.6 8zm.8 450.8c-112.5 0-203.7-93-203.7-202.8 0-105.5 85.5-203.3 203.8-203.3A201.7 201.7 0 01451.3 256c0 121.7-99.7 202.9-202.9 202.9z"></path> </svg>  <div class="relative z-10"> <div class="mb-2"> <strong class="text-gray-900">本文作者：</strong> <span>iami233</span> </div> <div class="mb-2"> <strong class="text-gray-900">本文链接：</strong> <a href="https://5ime.cn/pain2reflection.html" title="https://5ime.cn/pain2reflection.html" target="_blank" rel="noopener" class="text-blue-600 hover:text-blue-800 break-all" aria-label="文章永久链接"> https://5ime.cn/pain2reflection.html </a> </div> <div> <strong class="text-gray-900">版权声明：</strong> <span>本文采用 </span> <a href="https://creativecommons.org/licenses/by-nc-sa/3.0/cn/deed.zh" target="_blank" rel="external nofollow noopener noreferrer" class="text-blue-600 hover:text-blue-800" aria-label="查看 CC BY-NC-SA 3.0 CN 协议详情">
