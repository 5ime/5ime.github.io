	(() => {

		const MIN_MS = 800;

		const start = performance.now();
		let hidden = false;
		let scheduled = false;

		const hide = () => {
			if (hidden) return;
			hidden = true;
			loader.dataset.hidden = '';
			setTimeout(() => loader.remove(), 250);
		};

		const scheduleHide = () => {
			if (hidden || scheduled) return;
			scheduled = true;
			setTimeout(hide, Math.max(0, MIN_MS - (performance.now() - start)));
		};

		const show = () => {
			hidden = false;
			delete loader.dataset.hidden;
		};

		document.addEventListener('pointerdown', (e) => {
			const a = e.target.closest?.('a[href]');
